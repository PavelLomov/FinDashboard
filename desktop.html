<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Финансовый дашборд (standalone)</title>
<style>
:root{
  --bg:#0f1115; --bg2:#161920; --bg3:#1e222b; --border:#2a2f3a;
  --text:#e6e8eb; --text-dim:#8b909c; --text-faint:#5a5f6b;
  --accent:#4f8cff; --green:#3ecf8e; --red:#ff5c72; --amber:#e0a83e;
  --mono: ui-monospace, "SFMono-Regular", "Cascadia Mono", Consolas, monospace;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg); color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
  font-size:14px; line-height:1.45;
}
.num{ font-family:var(--mono); font-variant-numeric:tabular-nums; }
a{color:var(--accent);}
header{
  position:sticky; top:0; z-index:20;
  background:rgba(15,17,21,0.96); backdrop-filter:blur(6px);
  border-bottom:1px solid var(--border);
  padding:12px 20px;
}
.header-row{display:flex; align-items:center; gap:20px; flex-wrap:wrap;}
.title{font-size:16px; font-weight:600; letter-spacing:0.2px; margin-right:auto; white-space:nowrap;}
.title small{display:block; font-weight:400; color:var(--text-dim); font-size:11px; margin-top:1px;}

.period-controls{display:flex; align-items:center; gap:10px; flex-wrap:wrap;}
.seg{display:flex; border:1px solid var(--border); border-radius:6px; overflow:hidden;}
.seg button{
  background:var(--bg2); color:var(--text-dim); border:none; padding:6px 12px;
  font-size:12.5px; cursor:pointer; border-right:1px solid var(--border);
}
.seg button:last-child{border-right:none;}
.seg button.active{background:var(--accent); color:#fff;}
select, input[type=date], input[type=text], input[type=number]{
  background:var(--bg2); color:var(--text); border:1px solid var(--border);
  border-radius:6px; padding:6px 9px; font-size:12.5px; font-family:inherit;
}
select:focus, input:focus{outline:1px solid var(--accent);}
.btn{
  background:var(--bg3); color:var(--text-dim); border:1px solid var(--border);
  border-radius:6px; padding:6px 12px; font-size:12.5px; cursor:pointer;
}
.btn:hover{color:var(--text); border-color:#3a4050;}

nav.tabs{display:flex; gap:2px; padding:0 20px; border-bottom:1px solid var(--border); background:var(--bg);}
nav.tabs button{
  background:none; border:none; color:var(--text-dim); padding:10px 16px;
  font-size:13px; cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-1px;
}
nav.tabs button.active{color:var(--text); border-bottom-color:var(--accent);}
nav.tabs button:hover{color:var(--text);}

main{padding:20px; max-width:1180px; margin:0 auto;}
.tab-panel{display:none;}
.tab-panel.active{display:block;}

.cards{display:grid; grid-template-columns:repeat(5,1fr); gap:12px; margin-bottom:18px;}
.card{
  background:var(--bg2); border:1px solid var(--border); border-radius:10px;
  padding:14px 16px; min-width:0;
}
.card .label{color:var(--text-dim); font-size:11.5px; text-transform:uppercase; letter-spacing:0.4px; margin-bottom:6px;}
.card .value{font-size:18px; font-weight:600; white-space:nowrap;}
.card .value.pos{color:var(--green);}
.card .value.neg{color:var(--red);}

.side-blocks{display:grid; grid-template-columns:1fr; max-width:280px; gap:12px; margin-bottom:22px;}
.side-block{
  background:var(--bg3); border:1px dashed var(--border); border-radius:10px; padding:12px 16px;
}
.side-block h4{margin:0 0 8px 0; font-size:12px; color:var(--text-dim); font-weight:600; text-transform:uppercase; letter-spacing:0.4px; display:flex; align-items:center; justify-content:space-between;}
.side-block .rows{display:flex; gap:18px; flex-wrap:wrap;}
.side-block .metric{display:flex; flex-direction:column;}
.side-block .metric .k{font-size:11px; color:var(--text-faint);}
.side-block .metric .v{font-size:16px; font-weight:600;}

section.block{margin-bottom:26px;}
h2.section-title{font-size:13px; text-transform:uppercase; letter-spacing:0.5px; color:var(--text-dim); margin:0 0 10px 0; font-weight:600;}

.donut-wrap{
  background:var(--bg2); border:1px solid var(--border); border-radius:10px; padding:20px;
  width:100%; box-sizing:border-box;
  display:flex; align-items:center; justify-content:center;
}
canvas#donutChart{flex-shrink:0; max-width:100%; height:auto;}
.donut-empty{color:var(--text-faint); font-size:13px;}

table.cat-table{width:100%; border-collapse:collapse;}
table.cat-table th{
  text-align:left; font-size:11px; text-transform:uppercase; color:var(--text-faint);
  padding:6px 10px; border-bottom:1px solid var(--border); font-weight:600;
}
table.cat-table td{padding:8px 10px; border-bottom:1px solid var(--border); vertical-align:middle;}
table.cat-table tr.cat-row{cursor:pointer;}
table.cat-table tr.cat-row:hover{background:var(--bg3);}
.cat-emoji{font-size:15px;}
.pct-bar-wrap{display:flex; align-items:center; gap:8px;}
.pct-bar{height:6px; background:var(--bg3); border-radius:3px; flex:1; overflow:hidden; min-width:60px;}
.pct-bar > i{display:block; height:100%; background:var(--accent);}
.caret{display:inline-block; width:14px; color:var(--text-faint); transition:transform .15s;}
.caret.open{transform:rotate(90deg);}
.amount{text-align:right; font-weight:600;}
.amount.neg{color:var(--red);}
.amount.pos{color:var(--green);}

.sub-panel{background:var(--bg); }
.sub-panel td{background:var(--bg2);}
.merchant-row{cursor:pointer;}
.merchant-row:hover{background:var(--bg3) !important;}
.tx-list{padding:6px 0 6px 30px;}
.tx-list table{width:100%; border-collapse:collapse;}
.tx-list td{border-bottom:1px solid var(--border); padding:4px 8px; font-size:12.5px; color:var(--text-dim);}
.indent1{padding-left:26px !important;}
.indent2{padding-left:44px !important;}
.raw-desc{color:var(--text-faint); font-size:11px; font-family:var(--mono); white-space:normal; word-break:break-word;}

.featured-tiles{display:flex; gap:10px; flex-wrap:wrap; padding:8px 0 10px 26px;}
.tile{
  background:var(--bg3); border:1px solid var(--border); border-radius:10px;
  padding:10px 14px; cursor:pointer; min-width:150px; display:flex; align-items:center; gap:10px;
}
.tile:hover{border-color:var(--accent);}
.tile .tile-icon{font-size:24px;}
.tile .tile-name{font-weight:600; font-size:13px;}
.tile .tile-meta{color:var(--text-faint); font-size:11px;}
.tile-detail{display:none; padding:4px 0 10px 26px;}
.tile-detail.open{display:block;}
.tile-detail table{width:100%; border-collapse:collapse;}
.tile-detail td{border-bottom:1px solid var(--border); padding:4px 8px; font-size:12.5px; color:var(--text-dim);}

.badge{display:inline-block; font-size:10px; padding:1px 6px; border-radius:10px; background:var(--amber); color:#1a1400; font-weight:700; margin-left:6px; vertical-align:middle;}

.person-card, .org-card{
  background:var(--bg2); border:1px solid var(--border); border-radius:10px;
  margin-bottom:8px; overflow:hidden;
}
.person-head, .org-head{
  display:flex; align-items:center; justify-content:space-between; padding:10px 14px; cursor:pointer;
}
.person-head:hover, .org-head:hover{background:var(--bg3);}
.person-name{font-weight:600; display:flex; align-items:center;}
.person-metrics{display:flex; gap:16px;}
.person-metrics .m{display:flex; flex-direction:column; align-items:flex-end;}
.person-metrics .m .k{font-size:10px; color:var(--text-faint); text-transform:uppercase;}
.person-metrics .m .v{font-size:13.5px; font-weight:600;}
.person-detail{display:none; padding:0 14px 12px 14px;}
.person-detail.open{display:block;}
.person-detail table{width:100%; border-collapse:collapse;}
.person-detail td{padding:5px 8px; border-bottom:1px solid var(--border); font-size:12.5px;}
.dir-badge{font-size:10px; padding:1px 6px; border-radius:4px;}
.dir-in{background:rgba(62,207,142,0.15); color:var(--green);}
.dir-out{background:rgba(255,92,114,0.15); color:var(--red);}

.filters{
  display:flex; gap:10px; flex-wrap:wrap; align-items:flex-end; margin-bottom:14px;
  background:var(--bg2); border:1px solid var(--border); border-radius:10px; padding:12px 14px;
}
.filter-group{display:flex; flex-direction:column; gap:4px;}
.filter-group label{font-size:10.5px; color:var(--text-faint); text-transform:uppercase; letter-spacing:0.3px;}
.multiselect{position:relative;}
.multiselect-btn{min-width:150px; text-align:left; cursor:pointer;}
.multiselect-panel{
  display:none; position:absolute; top:calc(100% + 4px); left:0; z-index:30;
  background:var(--bg3); border:1px solid var(--border); border-radius:8px; padding:8px; min-width:220px;
  box-shadow:0 8px 24px rgba(0,0,0,0.4); max-height:340px; overflow-y:auto;
}
.multiselect-panel.open{display:block;}
.multiselect-panel label{
  display:flex; align-items:center; gap:6px; padding:4px 6px; font-size:12.5px; cursor:pointer; border-radius:4px;
}
.multiselect-panel label:hover{background:var(--bg2);}
.amount-range{display:flex; gap:6px; align-items:center;}
.amount-range input{width:90px;}

.ops-summary{font-size:12px; color:var(--text-dim); margin-bottom:10px;}
.ops-summary b{color:var(--text);}
table.ops-table{width:100%; border-collapse:collapse; font-size:12.5px;}
table.ops-table th{
  position:sticky; top:97px; background:var(--bg2);
  text-align:left; font-size:10.5px; text-transform:uppercase; color:var(--text-faint);
  padding:7px 9px; border-bottom:1px solid var(--border);
}
table.ops-table td{padding:6px 9px; border-bottom:1px solid var(--border);}
table.ops-table tbody tr:hover{background:var(--bg2);}
.role-tag{font-size:10px; color:var(--amber);}
.cat-tag{
  display:inline-block; font-size:10.5px; padding:1px 7px; border-radius:4px;
  background:var(--bg3); color:var(--text-dim); border:1px solid var(--border);
}
.empty-note{color:var(--text-faint); padding:30px; text-align:center; font-size:13px;}
.total-row{color:var(--text-faint); font-size:11px; margin-top:8px;}
</style>
</head>
<body>

<header>
  <div class="header-row">
    <div class="title">Финансовый дашборд<small id="periodLabel"></small></div>
    <div class="period-controls">
      <div class="seg" id="periodModeSeg">
        <button data-mode="month" class="active">Месяц</button>
        <button data-mode="range">Период</button>
      </div>
      <select id="monthSelect"></select>
      <div id="rangeInputs" style="display:none; gap:6px; align-items:center;">
        <input type="date" id="dateFrom">
        <span style="color:var(--text-faint)">—</span>
        <input type="date" id="dateTo">
      </div>
      <button class="btn" id="resetPeriod">Весь период</button>
    </div>
  </div>
</header>

<nav class="tabs">
  <button data-tab="overview" class="active">Обзор</button>
  <button data-tab="transfers">Переводы</button>
  <button data-tab="donations">Пожертвования</button>
  <button data-tab="operations">Операции</button>
</nav>

<main>

  <!-- OVERVIEW -->
  <div class="tab-panel active" id="tab-overview">

    <div class="cards">
      <div class="card"><div class="label">Поступления</div><div class="value pos num" id="cardReceipts">—</div></div>
      <div class="card"><div class="label">Расходы</div><div class="value neg num" id="cardExpenses">—</div></div>
      <div class="card"><div class="label">Переводы</div><div class="value neg num" id="cardTransfersOut">—</div></div>
      <div class="card"><div class="label">Пожертвования</div><div class="value neg num" id="cardDonations">—</div></div>
      <div class="card"><div class="label">Баланс за период</div><div class="value num" id="cardBalance">—</div></div>
    </div>

    <div class="side-blocks">
      <div class="side-block">
        <h4>Наличные</h4>
        <div class="rows">
          <div class="metric"><span class="k">Внесено</span><span class="v pos num" id="cashIn">—</span></div>
          <div class="metric"><span class="k">Снято</span><span class="v neg num" id="cashOut">—</span></div>
        </div>
      </div>
    </div>

    <section class="block">
      <h2 class="section-title">Доля расходов по категориям</h2>
      <div class="donut-wrap" id="donutWrap"></div>
    </section>

    <section class="block">
      <h2 class="section-title">По категориям</h2>
      <table class="cat-table">
        <thead><tr><th style="width:22px;"></th><th style="width:24px;"></th><th>Категория</th><th style="text-align:right;">Сумма</th><th style="width:160px;">% от расходов</th></tr></thead>
        <tbody id="catTableBody"></tbody>
      </table>
    </section>
  </div>

  <!-- TRANSFERS -->
  <div class="tab-panel" id="tab-transfers">
    <h2 class="section-title">Контрагенты по обороту</h2>
    <div id="transfersList"></div>
  </div>

  <!-- DONATIONS -->
  <div class="tab-panel" id="tab-donations">
    <h2 class="section-title">По организациям</h2>
    <div id="donationsList"></div>
  </div>

  <!-- OPERATIONS -->
  <div class="tab-panel" id="tab-operations">
    <div class="filters">
      <div class="filter-group">
        <label>Категория</label>
        <div class="multiselect" id="catFilterMS">
          <button type="button" class="btn multiselect-btn" id="catFilterBtn">Все категории</button>
          <div class="multiselect-panel" id="catFilterPanel"></div>
        </div>
      </div>
      <div class="filter-group">
        <label>Контрагент / организация</label>
        <input type="text" id="counterpartyFilter" placeholder="имя или заведение...">
      </div>
      <div class="filter-group">
        <label>Сумма, ₽</label>
        <div class="amount-range">
          <input type="number" id="amountMin" placeholder="от">
          <input type="number" id="amountMax" placeholder="до">
        </div>
      </div>
      <div class="filter-group">
        <label>Поиск по тексту</label>
        <input type="text" id="textSearch" placeholder="поиск по всем полям...">
      </div>
      <button class="btn" id="clearFilters">Сбросить фильтры</button>
    </div>
    <div class="ops-summary" id="opsSummary"></div>
    <table class="ops-table">
      <thead><tr>
        <th style="width:90px;">Дата</th><th style="width:56px;">Время</th>
        <th style="text-align:right; width:110px;">Сумма</th>
        <th style="width:150px;">Категория</th><th>Контрагент / организация</th>
      </tr></thead>
      <tbody id="opsTableBody"></tbody>
    </table>
  </div>

</main>

<script>
/* ---------------- constants ---------------- */
const EXPENSE_CATS = ["Продукты","Транспорт","Подписки","Прочее","Развлечения","Здоровье","Связь",
  "Рестораны","Еда вне дома","Кредиты","Техника","Налоги","Подарки"];
const DONATION_CAT = "Пожертвования";
const TRANSFER_CAT = "Переводы";
const CASH_CAT = "Наличные";
const SPEND_CATS = [...EXPENSE_CATS, DONATION_CAT];
const ALL_CATS = [TRANSFER_CAT, CASH_CAT, ...EXPENSE_CATS, DONATION_CAT];

const MONTH_NAMES_NOM = ["Январь","Февраль","Март","Апрель","Май","Июнь","Июль","Август","Сентябрь","Октябрь","Ноябрь","Декабрь"];

const CATEGORY_EMOJI = {
  "Переводы":"💸", "Наличные":"💵", "Продукты":"🛒",
  "Транспорт":"🚗", "Подписки":"🔁", "Прочее":"📦", "Пожертвования":"🎗️",
  "Развлечения":"🎮", "Здоровье":"💊", "Связь":"📱",
  "Рестораны":"🍽️", "Еда вне дома":"🥡", "Кредиты":"💳", "Техника":"💻",
  "Налоги":"🧾", "Подарки":"🎁"
};
// One consistent palette family (3 base hues — blue / teal / violet, all cool tones
// that sit well on the dark surface) with tone steps generated per hue, rather than
// picking a different, unrelated color for every category. Identity on the chart
// comes from the text labels (every segment is named directly), so the palette's
// job is just to look coherent and give adjacent wedges a visible edge — it doesn't
// have to carry identity alone.
const PALETTE_HUES = [212, 172, 262]; // blue, teal, violet
const PALETTE_TONES = [
  {s:72, l:58}, {s:60, l:66}, {s:80, l:74}, {s:50, l:60}, {s:65, l:70}
];
function buildCategoryColors(cats){
  const map = {};
  cats.forEach((cat, i) => {
    const hue = PALETTE_HUES[i % PALETTE_HUES.length];
    const tone = PALETTE_TONES[Math.floor(i / PALETTE_HUES.length) % PALETTE_TONES.length];
    map[cat] = `hsl(${hue} ${tone.s}% ${tone.l}%)`;
  });
  return map;
}
const CATEGORY_COLOR = buildCategoryColors(SPEND_CATS);
const FEATURED_MERCHANTS = {
  "самокат": {icon:"🛴", label:"Самокат"},
  "яндекс лавка": {icon:"🛒", label:"Яндекс Лавка"},
  "яндекс.лавка": {icon:"🛒", label:"Яндекс Лавка"}
};
// Verified same person under two spellings after the last dataset refresh
// (unique match on first+patronymic across all 96 transfer counterparties;
// "Даниил Михайлович" was checked too but has two different surname initials
// — genuinely two different people — so it was left alone).
const CONTRAGENT_ALIASES = {
  "Мария Владимировна": "М. Мария Владимировна"
};

let DATA = [];
let periodMode = "month";
let selectedMonth = null;
let rangeFrom = null, rangeTo = null;
let activeTab = "overview";

/* ---------------- formatting helpers ---------------- */
function fmtMoney(n, opts){
  opts = opts || {};
  const sign = n < 0 ? "−" : (opts.forceSign ? "+" : "");
  const abs = Math.abs(n);
  const parts = abs.toFixed(2).split(".");
  parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, " ");
  return sign + parts[0] + "," + parts[1] + " ₽";
}
// No leading minus for expense-style amounts — the red color already says "spend".
// (Наличные "Снято" is the one deliberate exception and keeps the normal fmtMoney sign.)
function fmtMoneyNoSign(n){
  return fmtMoney(Math.abs(n));
}
// For amounts that can go either way (transfers, the operations ledger): a negative
// value drops its minus (red carries the meaning), a positive value keeps its "+".
function fmtMoneyDir(n){
  return n < 0 ? fmtMoneyNoSign(n) : fmtMoney(n, {forceSign:true});
}
function fmtDate(iso){
  const [y,m,d] = iso.split("-").map(Number);
  return String(d).padStart(2,"0") + "." + String(m).padStart(2,"0") + "." + y;
}
function pctFmt(p){
  if(!isFinite(p)) return "0%";
  return p.toFixed(1).replace(".", ",") + "%";
}
function pluralOps(n){
  const n100 = n % 100;
  const n10 = n % 10;
  if(n100 >= 11 && n100 <= 14) return "операций";
  if(n10 === 1) return "операция";
  if(n10 >= 2 && n10 <= 4) return "операции";
  return "операций";
}
function normMerchant(m){
  return (m || "").trim().toLowerCase();
}

 (Ноябрьск)","date":"2026-07-02","time":"10:30","amount":-500.0,"category":"Пожертвования"}];
async function loadData(){
  DATA = EMBEDDED_DATA;
  init();
}

/* ---------------- init ---------------- */
function init(){
  DATA.forEach((t,i)=> t._id = i);

  buildMonthSelect();
  buildCatFilter();
  setFullRangeDefaults();
  selectedMonth = uniqueMonths()[0];
  wireEvents();
  render();
}

function uniqueMonths(){
  const set = new Set(DATA.map(t => t.date.slice(0,7)));
  return Array.from(set).sort();
}
function dataMinMaxDate(){
  let min = DATA[0].date, max = DATA[0].date;
  for(const t of DATA){ if(t.date < min) min = t.date; if(t.date > max) max = t.date; }
  return [min, max];
}
function setFullRangeDefaults(){
  const [min,max] = dataMinMaxDate();
  rangeFrom = min; rangeTo = max;
  document.getElementById("dateFrom").value = min;
  document.getElementById("dateFrom").min = min; document.getElementById("dateFrom").max = max;
  document.getElementById("dateTo").value = max;
  document.getElementById("dateTo").min = min; document.getElementById("dateTo").max = max;
}

function buildMonthSelect(){
  const sel = document.getElementById("monthSelect");
  sel.innerHTML = "";
  for(const m of uniqueMonths()){
    const [y, mo] = m.split("-").map(Number);
    const opt = document.createElement("option");
    opt.value = m;
    opt.textContent = MONTH_NAMES_NOM[mo-1] + " " + y;
    sel.appendChild(opt);
  }
}

function buildCatFilter(){
  const panel = document.getElementById("catFilterPanel");
  panel.innerHTML = "";
  for(const c of ALL_CATS){
    const label = document.createElement("label");
    const cb = document.createElement("input");
    cb.type = "checkbox"; cb.value = c; cb.checked = true; cb.className = "cat-cb";
    label.appendChild(cb);
    label.appendChild(document.createTextNode((CATEGORY_EMOJI[c]||"") + " " + c));
    panel.appendChild(label);
  }
}

/* ---------------- period filtering ---------------- */
function currentPeriodRange(){
  if(periodMode === "month"){
    const m = selectedMonth;
    const [y, mo] = m.split("-").map(Number);
    const start = m + "-01";
    const lastDay = new Date(y, mo, 0).getDate();
    const end = m + "-" + String(lastDay).padStart(2,"0");
    return [start, end];
  }else{
    return [rangeFrom, rangeTo];
  }
}
function inPeriod(t){
  const [start,end] = currentPeriodRange();
  return t.date >= start && t.date <= end;
}
function periodTransactions(){
  return DATA.filter(inPeriod);
}

/* ---------------- shared metrics ---------------- */
function computeMetrics(txs){
  let receipts=0, expenses=0, donations=0, balance=0;
  const catNeg = {};
  for(const c of EXPENSE_CATS) catNeg[c]=0;
  catNeg[DONATION_CAT]=0;
  for(const t of txs){
    balance += t.amount; // raw balance: absolutely every operation
    if(t.amount > 0) receipts += t.amount;
    if(EXPENSE_CATS.includes(t.category)){
      if(t.amount < 0){ expenses += -t.amount; catNeg[t.category] += -t.amount; }
    }else if(t.category === DONATION_CAT){
      donations += -t.amount; catNeg[DONATION_CAT] += -t.amount;
    }
  }
  return {receipts, expenses, donations, balance, catNeg};
}

/* ---------------- events ---------------- */
function wireEvents(){
  document.querySelectorAll("#periodModeSeg button").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      periodMode = btn.dataset.mode;
      document.querySelectorAll("#periodModeSeg button").forEach(b=>b.classList.toggle("active", b===btn));
      document.getElementById("monthSelect").style.display = periodMode==="month" ? "" : "none";
      document.getElementById("rangeInputs").style.display = periodMode==="range" ? "flex" : "none";
      render();
    });
  });
  document.getElementById("monthSelect").addEventListener("change", e=>{
    selectedMonth = e.target.value; render();
  });
  document.getElementById("dateFrom").addEventListener("change", e=>{ rangeFrom = e.target.value; render(); });
  document.getElementById("dateTo").addEventListener("change", e=>{ rangeTo = e.target.value; render(); });
  document.getElementById("resetPeriod").addEventListener("click", ()=>{
    periodMode = "range";
    document.querySelectorAll("#periodModeSeg button").forEach(b=>b.classList.toggle("active", b.dataset.mode==="range"));
    document.getElementById("monthSelect").style.display = "none";
    document.getElementById("rangeInputs").style.display = "flex";
    setFullRangeDefaults();
    render();
  });

  document.querySelectorAll("nav.tabs button").forEach(btn=>{
    btn.addEventListener("click", ()=> activateTab(btn.dataset.tab));
  });

  const msBtn = document.getElementById("catFilterBtn");
  const msPanel = document.getElementById("catFilterPanel");
  msBtn.addEventListener("click", (e)=>{ e.stopPropagation(); msPanel.classList.toggle("open"); });
  document.addEventListener("click", (e)=>{
    if(!document.getElementById("catFilterMS").contains(e.target)) msPanel.classList.remove("open");
  });
  msPanel.addEventListener("change", ()=>{ updateCatFilterLabel(); renderOperations(); });

  document.getElementById("counterpartyFilter").addEventListener("input", renderOperations);
  document.getElementById("amountMin").addEventListener("input", renderOperations);
  document.getElementById("amountMax").addEventListener("input", renderOperations);
  document.getElementById("textSearch").addEventListener("input", renderOperations);
  document.getElementById("clearFilters").addEventListener("click", ()=>{
    resetOperationsFilters();
    renderOperations();
  });
}

function activateTab(tab){
  activeTab = tab;
  document.querySelectorAll("nav.tabs button").forEach(b=>b.classList.toggle("active", b.dataset.tab===tab));
  document.querySelectorAll(".tab-panel").forEach(p=>p.classList.remove("active"));
  document.getElementById("tab-"+tab).classList.add("active");
  renderActiveTab();
}

function resetOperationsFilters(){
  document.querySelectorAll(".cat-cb").forEach(cb=>cb.checked = true);
  updateCatFilterLabel();
  document.getElementById("counterpartyFilter").value = "";
  document.getElementById("amountMin").value = "";
  document.getElementById("amountMax").value = "";
  document.getElementById("textSearch").value = "";
}

function updateCatFilterLabel(){
  const checked = Array.from(document.querySelectorAll(".cat-cb:checked")).map(cb=>cb.value);
  const btn = document.getElementById("catFilterBtn");
  if(checked.length === ALL_CATS.length) btn.textContent = "Все категории";
  else if(checked.length === 0) btn.textContent = "Ничего не выбрано";
  else btn.textContent = checked.length + " категории(й)";
}

/* ---------------- render orchestration ---------------- */
function render(){
  updatePeriodLabel();
  renderActiveTab();
}
function renderActiveTab(){
  if(activeTab === "overview") renderOverview();
  else if(activeTab === "transfers") renderTransfers();
  else if(activeTab === "donations") renderDonations();
  else if(activeTab === "operations") renderOperations();
}

function updatePeriodLabel(){
  const [start,end] = currentPeriodRange();
  document.getElementById("periodLabel").textContent = fmtDate(start) + " — " + fmtDate(end);
}

/* ---------------- OVERVIEW ---------------- */
function renderOverview(){
  const txs = periodTransactions();
  const m = computeMetrics(txs);

  let trOut=0, cashIn=0, cashOut=0;
  for(const t of txs){
    if(t.category === TRANSFER_CAT){
      if(t.amount < 0) trOut += -t.amount;
    }else if(t.category === CASH_CAT){
      if(t.amount > 0) cashIn += t.amount; else cashOut += -t.amount;
    }
  }

  document.getElementById("cardReceipts").textContent = fmtMoney(m.receipts);
  document.getElementById("cardExpenses").textContent = fmtMoneyNoSign(m.expenses);
  document.getElementById("cardTransfersOut").textContent = fmtMoneyNoSign(trOut);
  document.getElementById("cardDonations").textContent = fmtMoneyNoSign(m.donations);
  const balEl = document.getElementById("cardBalance");
  balEl.textContent = fmtMoney(m.balance, {forceSign:true});
  balEl.className = "value num " + (m.balance >= 0 ? "pos" : "neg");

  document.getElementById("cashIn").textContent = fmtMoney(cashIn);
  document.getElementById("cashOut").textContent = fmtMoney(-cashOut);

  renderDonutChart(m.catNeg, m.expenses + m.donations);
  renderCategoryTable(txs, m.catNeg, m.expenses + m.donations);
}

/* ---------------- DONUT CHART ---------------- */
// Design: no emoji on the chart itself (only in the category list below). Big-enough
// segments get their label drawn inline, snug against the segment; small segments get
// a plain leader line (radial nub + diagonal to a stacked label column on the side) —
// the standard pie/donut "outside label" pattern, with collision avoidance so stacked
// labels never overlap.
function renderDonutChart(catNeg, total){
  const wrap = document.getElementById("donutWrap");
  wrap.innerHTML = "";

  const segments = SPEND_CATS
    .map(c => ({cat:c, value: catNeg[c] || 0}))
    .filter(s => s.value > 0)
    .sort((a,b)=> b.value - a.value);

  if(segments.length === 0 || total <= 0){
    wrap.innerHTML = '<div class="donut-empty">Нет расходов за выбранный период</div>';
    return;
  }

  // The pie radius scales with the available block width (roughly 3x the old fixed
  // 320px chart where there's room). The overall canvas size is then DERIVED from
  // that radius plus whatever margin the outside labels actually measure out to need
  // — not a guessed constant — so nothing clips regardless of category name/amount length.
  const availWidth = wrap.clientWidth || 900;
  const rOuter = Math.max(160, Math.min(300, availWidth*0.28));
  const rInner = rOuter*0.56;
  const labelR = (rOuter + rInner) / 2;

  let start = -Math.PI/2;
  const withAngles = segments.map(s => {
    const frac = s.value/total;
    const segStart = start, segEnd = start + frac*Math.PI*2;
    start = segEnd;
    return {...s, segStart, segEnd, mid: (segStart+segEnd)/2};
  });

  const NAME_FONT = "600 14px sans-serif";
  const META_FONT = "12px sans-serif";
  const metaText = s => pctFmt(s.value/total*100) + " · " + fmtMoneyNoSign(s.value);

  // measure first (any canvas 2d context can measure) to decide inline vs. outside
  // and to size the canvas so outside labels always have room
  const mctx = document.createElement("canvas").getContext("2d");
  mctx.font = NAME_FONT;
  const nameWidths = withAngles.map(s => mctx.measureText(s.cat).width);
  mctx.font = META_FONT;
  const metaWidths = withAngles.map(s => mctx.measureText(metaText(s)).width);

  const inlineFlags = withAngles.map((s,i) => {
    const chordW = 2*labelR*Math.sin((s.segEnd-s.segStart)/2);
    const neededW = Math.max(nameWidths[i], metaWidths[i]) + 14;
    return neededW <= chordW;
  });
  const outsideIdx = withAngles.map((_,i)=>i).filter(i=>!inlineFlags[i]);

  // Each outside segment leads off toward whichever side it's actually closer to —
  // left/right for segments nearer the horizontal, up/down for segments nearer the
  // vertical — instead of forcing every small wedge into the same corner.
  const nubGap = 14, diagGap = 22, pad = 14;
  function quadrant(s){
    return Math.abs(Math.cos(s.mid)) >= Math.abs(Math.sin(s.mid))
      ? (Math.cos(s.mid) >= 0 ? "right" : "left")
      : (Math.sin(s.mid) >= 0 ? "bottom" : "top");
  }
  const byQuadrant = {left:[], right:[], top:[], bottom:[]};
  for(const i of outsideIdx) byQuadrant[quadrant(withAngles[i])].push(i);

  let maxSideW = 0;
  for(const i of [...byQuadrant.left, ...byQuadrant.right]) maxSideW = Math.max(maxSideW, nameWidths[i], metaWidths[i]);
  const hMargin = (byQuadrant.left.length||byQuadrant.right.length) ? (nubGap+diagGap+maxSideW+pad) : 30;
  const vMargin = (byQuadrant.top.length||byQuadrant.bottom.length) ? (nubGap+diagGap+34) : 30;

  function rowWidthNeeded(list){
    if(!list.length) return 0;
    return list.reduce((sum,i) => sum + Math.max(nameWidths[i], metaWidths[i]) + 16, 0);
  }
  const rowW = Math.max(rowWidthNeeded(byQuadrant.top), rowWidthNeeded(byQuadrant.bottom));

  const size = Math.min(1000, Math.max(
    rOuter*2 + 60,
    2*(rOuter + hMargin),
    2*rOuter + 2*vMargin + 40,
    rowW + 60
  ));
  const cx = size/2, cy = size/2;

  const canvas = document.createElement("canvas");
  const dpr = window.devicePixelRatio || 1;
  canvas.width = size*dpr; canvas.height = size*dpr;
  canvas.style.width = size+"px";
  canvas.id = "donutChart";
  const ctx = canvas.getContext("2d");
  ctx.setTransform(dpr,0,0,dpr,0,0);

  const SURFACE = "#161920";
  for(const s of withAngles){
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,rOuter,s.segStart,s.segEnd);
    ctx.closePath();
    ctx.fillStyle = CATEGORY_COLOR[s.cat] || "#888";
    ctx.fill();
    ctx.lineWidth = 2;
    ctx.strokeStyle = SURFACE;
    ctx.stroke();
  }
  ctx.globalCompositeOperation = "destination-out";
  ctx.beginPath();
  ctx.arc(cx,cy,rInner,0,Math.PI*2);
  ctx.fill();
  ctx.globalCompositeOperation = "source-over";

  function haloText(text, x, y, font, fill){
    ctx.font = font;
    ctx.lineWidth = 3;
    ctx.strokeStyle = "rgba(15,17,21,0.55)";
    ctx.strokeText(text, x, y);
    ctx.fillStyle = fill;
    ctx.fillText(text, x, y);
  }

  // inline labels: centered in the ring, snug against the segment
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  withAngles.forEach((s,i) => {
    if(!inlineFlags[i]) return;
    const lx = cx + Math.cos(s.mid)*labelR;
    const ly = cy + Math.sin(s.mid)*labelR;
    haloText(s.cat, lx, ly - 9, NAME_FONT, "#ffffff");
    haloText(metaText(s), lx, ly + 11, META_FONT, "#f2f3f5");
  });

  // outside labels: a plain leader line — radial nub away from the segment's own
  // position, then a kink to a strictly axis-aligned run (horizontal for left/right
  // segments, vertical-then-horizontal for top/bottom ones) — to a label slot that's
  // collision-resolved against its neighbors on the SAME side, so a segment that's
  // physically at the top gets a line going up, one on the left gets a line going
  // left, and so on, instead of every small wedge being dragged into one corner.
  const nubR = rOuter + nubGap;
  const colX = rOuter + nubGap + diagGap;   // left/right label column distance
  const rowY = rOuter + nubGap + diagGap;   // top/bottom label row distance
  const rowGap = 30;    // min vertical gap between stacked left/right labels
  const colGap = 14;    // min horizontal gap between stacked top/bottom labels

  function layoutVertical(idxList){
    const items = idxList.map(i => ({i, y: cy + Math.sin(withAngles[i].mid)*rOuter}))
                          .sort((a,b)=>a.y-b.y);
    for(let k=1;k<items.length;k++){
      if(items[k].y - items[k-1].y < rowGap) items[k].y = items[k-1].y + rowGap;
    }
    for(let k=items.length-2;k>=0;k--){
      if(items[k+1].y - items[k].y < rowGap) items[k].y = items[k+1].y - rowGap;
    }
    return items;
  }
  function layoutHorizontal(idxList){
    const items = idxList.map(i => ({i, x: cx + Math.cos(withAngles[i].mid)*rOuter,
                                      w: Math.max(nameWidths[i], metaWidths[i]) + colGap}))
                          .sort((a,b)=>a.x-b.x);
    for(let k=1;k<items.length;k++){
      const minX = items[k-1].x + items[k-1].w/2 + items[k].w/2;
      if(items[k].x < minX) items[k].x = minX;
    }
    for(let k=items.length-2;k>=0;k--){
      const maxX = items[k+1].x - items[k+1].w/2 - items[k].w/2;
      if(items[k].x > maxX) items[k].x = maxX;
    }
    return items;
  }

  ctx.strokeStyle = "#5a5f6b";
  ctx.lineWidth = 1;

  for(const side of [{list:byQuadrant.right, dir:1}, {list:byQuadrant.left, dir:-1}]){
    const items = layoutVertical(side.list);
    for(const item of items){
      const s = withAngles[item.i];
      const anchorX = cx + Math.cos(s.mid)*rOuter, anchorY = cy + Math.sin(s.mid)*rOuter;
      const nubX = cx + Math.cos(s.mid)*nubR, nubY = cy + Math.sin(s.mid)*nubR;
      const labelX = cx + side.dir*colX;
      ctx.beginPath();
      ctx.moveTo(anchorX, anchorY);
      ctx.lineTo(nubX, nubY);
      ctx.lineTo(labelX, item.y);
      ctx.stroke();

      ctx.textAlign = side.dir>0 ? "left" : "right";
      ctx.textBaseline = "middle";
      const tx = labelX + side.dir*5;
      ctx.fillStyle = "#e6e8eb";
      ctx.font = NAME_FONT;
      ctx.fillText(s.cat, tx, item.y - 8);
      ctx.fillStyle = "#8b909c";
      ctx.font = META_FONT;
      ctx.fillText(metaText(s), tx, item.y + 8);
    }
  }

  for(const side of [{list:byQuadrant.bottom, dir:1}, {list:byQuadrant.top, dir:-1}]){
    const items = layoutHorizontal(side.list);
    for(const item of items){
      const s = withAngles[item.i];
      const anchorX = cx + Math.cos(s.mid)*rOuter, anchorY = cy + Math.sin(s.mid)*rOuter;
      const nubX = cx + Math.cos(s.mid)*nubR, nubY = cy + Math.sin(s.mid)*nubR;
      const labelY = cy + side.dir*rowY;
      ctx.beginPath();
      ctx.moveTo(anchorX, anchorY);
      ctx.lineTo(nubX, nubY);
      ctx.lineTo(nubX, labelY);
      ctx.lineTo(item.x, labelY);
      ctx.stroke();

      ctx.textAlign = "center";
      if(side.dir > 0){
        // bottom group: text hangs below the line, name first then the meta line
        ctx.textBaseline = "top";
        ctx.fillStyle = "#e6e8eb"; ctx.font = NAME_FONT;
        ctx.fillText(s.cat, item.x, labelY + 5);
        ctx.fillStyle = "#8b909c"; ctx.font = META_FONT;
        ctx.fillText(metaText(s), item.x, labelY + 21);
      }else{
        // top group: text sits above the line, growing upward — meta nearest the line
        ctx.textBaseline = "bottom";
        ctx.fillStyle = "#8b909c"; ctx.font = META_FONT;
        ctx.fillText(metaText(s), item.x, labelY - 5);
        ctx.fillStyle = "#e6e8eb"; ctx.font = NAME_FONT;
        ctx.fillText(s.cat, item.x, labelY - 21);
      }
    }
  }

  ctx.fillStyle = "#e6e8eb";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.font = "600 26px monospace";
  ctx.fillText(fmtMoneyNoSign(total).replace(" ₽",""), cx, cy-2);
  ctx.fillStyle = "#5a5f6b";
  ctx.font = "13px sans-serif";
  ctx.fillText("расходы", cx, cy+22);

  wrap.appendChild(canvas);
}

/* ---------------- CATEGORY TABLE ---------------- */
function renderCategoryTable(txs, catNeg, totalSpend){
  const tbody = document.getElementById("catTableBody");
  tbody.innerHTML = "";

  // Переводы: pinned first row, not part of "расходы" — expands to the same contragent list as the Переводы tab
  const trTxs = txs.filter(t => t.category === TRANSFER_CAT);
  let trIn=0, trOut=0;
  for(const t of trTxs){ if(t.amount>0) trIn+=t.amount; else trOut+=-t.amount; }
  const trRow = document.createElement("tr");
  trRow.className = "cat-row";
  trRow.innerHTML = `
    <td class="cat-emoji">${CATEGORY_EMOJI[TRANSFER_CAT]}</td>
    <td><span class="caret">▶</span></td>
    <td>${TRANSFER_CAT}</td>
    <td class="amount num">${fmtMoney(trIn-trOut, {forceSign:true})}</td>
    <td style="color:var(--text-faint);">—</td>
  `;
  const trSubTr = document.createElement("tr");
  trSubTr.className = "sub-panel";
  trSubTr.style.display = "none";
  const trSubTd = document.createElement("td");
  trSubTd.colSpan = 5;
  trSubTd.style.padding = "10px 10px 10px 30px";
  trSubTd.appendChild(buildTransfersList(trTxs));
  trSubTr.appendChild(trSubTd);
  trRow.addEventListener("click", ()=>{
    const isOpen = trSubTr.style.display !== "none";
    trSubTr.style.display = isOpen ? "none" : "";
    trRow.querySelector(".caret").classList.toggle("open", !isOpen);
  });
  tbody.appendChild(trRow);
  tbody.appendChild(trSubTr);

  const sorted = SPEND_CATS.slice().sort((a,b)=>catNeg[b]-catNeg[a]);

  for(const cat of sorted){
    const amt = catNeg[cat];
    const pct = totalSpend > 0 ? (amt/totalSpend*100) : 0;

    const tr = document.createElement("tr");
    tr.className = "cat-row";
    tr.innerHTML = `
      <td class="cat-emoji">${CATEGORY_EMOJI[cat]||""}</td>
      <td><span class="caret">▶</span></td>
      <td>${cat}</td>
      <td class="amount neg num">${fmtMoneyNoSign(amt)}</td>
      <td><div class="pct-bar-wrap"><div class="pct-bar"><i style="width:${pct}%"></i></div><span class="num" style="min-width:44px;display:inline-block;">${pctFmt(pct)}</span></div></td>
    `;
    const subTr = document.createElement("tr");
    subTr.className = "sub-panel";
    subTr.style.display = "none";
    const subTd = document.createElement("td");
    subTd.colSpan = 5;
    subTd.appendChild(buildMerchantList(txs, cat));
    subTr.appendChild(subTd);

    tr.addEventListener("click", ()=>{
      const isOpen = subTr.style.display !== "none";
      subTr.style.display = isOpen ? "none" : "";
      tr.querySelector(".caret").classList.toggle("open", !isOpen);
    });

    tbody.appendChild(tr);
    tbody.appendChild(subTr);
  }
}

function buildMerchantList(txs, cat){
  const wrap = document.createElement("div");
  wrap.className = "tx-list";
  const rows = txs.filter(t => t.category === cat && t.amount < 0);

  const featuredRows = rows.filter(t => FEATURED_MERCHANTS[normMerchant(t.merchant)]);
  const normalRows = rows.filter(t => !FEATURED_MERCHANTS[normMerchant(t.merchant)]);

  if(featuredRows.length > 0){
    wrap.appendChild(buildFeaturedTiles(featuredRows));
  }

  const byMerchant = {};
  for(const t of normalRows){
    const key = t.merchant || "—";
    if(!byMerchant[key]) byMerchant[key] = {sum:0, count:0, items:[]};
    byMerchant[key].sum += -t.amount;
    byMerchant[key].count += 1;
    byMerchant[key].items.push(t);
  }
  const merchants = Object.keys(byMerchant).sort((a,b)=>byMerchant[b].sum-byMerchant[a].sum);

  const table = document.createElement("table");
  for(const m of merchants){
    const info = byMerchant[m];
    const mainRow = document.createElement("tr");
    mainRow.className = "merchant-row";
    mainRow.innerHTML = `
      <td class="indent1"><span class="caret">▶</span> ${m}</td>
      <td class="num" style="color:var(--text-faint);">${info.count} ${pluralOps(info.count)}</td>
      <td class="amount neg num" style="text-align:right;">${fmtMoneyNoSign(info.sum)}</td>
    `;
    const detailRow = document.createElement("tr");
    detailRow.style.display = "none";
    const detailTd = document.createElement("td");
    detailTd.colSpan = 3;
    detailTd.appendChild(buildOperationsDetailTable(info.items));
    detailRow.appendChild(detailTd);

    mainRow.addEventListener("click", ()=>{
      const isOpen = detailRow.style.display !== "none";
      detailRow.style.display = isOpen ? "none" : "";
      mainRow.querySelector(".caret").classList.toggle("open", !isOpen);
    });

    table.appendChild(mainRow);
    table.appendChild(detailRow);
  }
  wrap.appendChild(table);
  return wrap;
}

function buildOperationsDetailTable(items){
  const innerTable = document.createElement("table");
  innerTable.style.width = "100%";
  for(const t of items.slice().sort((a,b)=> (a.date+a.time) < (b.date+b.time) ? 1 : -1)){
    const r = document.createElement("tr");
    r.innerHTML = `
      <td class="indent2" style="white-space:nowrap;">${fmtDate(t.date)} ${t.time}</td>
      <td class="amount neg num" style="text-align:right; white-space:nowrap;">${fmtMoneyNoSign(t.amount)}</td>
      <td class="raw-desc">${t.raw_description || ""}</td>
    `;
    innerTable.appendChild(r);
  }
  return innerTable;
}

function buildFeaturedTiles(rows){
  const container = document.createElement("div");
  const tileRow = document.createElement("div");
  tileRow.className = "featured-tiles";

  const byMerchant = {};
  for(const t of rows){
    const norm = normMerchant(t.merchant);
    if(!byMerchant[norm]) byMerchant[norm] = {info: FEATURED_MERCHANTS[norm], sum:0, count:0, items:[]};
    byMerchant[norm].sum += -t.amount;
    byMerchant[norm].count += 1;
    byMerchant[norm].items.push(t);
  }

  for(const key of Object.keys(byMerchant)){
    const b = byMerchant[key];
    const tile = document.createElement("div");
    tile.className = "tile";
    tile.innerHTML = `
      <span class="tile-icon">${b.info.icon}</span>
      <span>
        <span class="tile-name">${b.info.label}</span><br>
        <span class="tile-meta">${b.count} ${pluralOps(b.count)} · <span class="amount neg num">${fmtMoneyNoSign(b.sum)}</span></span>
      </span>
    `;
    const detail = document.createElement("div");
    detail.className = "tile-detail";
    detail.appendChild(buildOperationsDetailTable(b.items));
    tile.addEventListener("click", ()=> detail.classList.toggle("open"));
    tileRow.appendChild(tile);
    container.appendChild(detail);
  }

  const wrap = document.createElement("div");
  wrap.appendChild(tileRow);
  wrap.appendChild(container);
  return wrap;
}

/* ---------------- TRANSFERS (shared: tab + category sub-panel) ---------------- */
function buildTransfersList(txs){
  const container = document.createElement("div");
  const byPerson = {};
  for(const t of txs){
    const rawKey = t.counterparty || t.merchant || "—";
    const key = CONTRAGENT_ALIASES[rawKey] || rawKey;
    if(!byPerson[key]) byPerson[key] = {in:0, out:0, self:false, items:[]};
    if(t.amount>0) byPerson[key].in += t.amount; else byPerson[key].out += -t.amount;
    if(t.counterparty_role === "себе") byPerson[key].self = true;
    byPerson[key].items.push(t);
  }
  const people = Object.keys(byPerson).sort((a,b)=> (byPerson[b].in+byPerson[b].out) - (byPerson[a].in+byPerson[a].out));

  if(people.length===0){
    container.innerHTML = '<div class="empty-note">Нет переводов за выбранный период</div>';
    return container;
  }
  for(const p of people){
    const info = byPerson[p];
    const net = info.in - info.out;
    const card = document.createElement("div");
    card.className = "person-card";
    const head = document.createElement("div");
    head.className = "person-head";
    head.innerHTML = `
      <span class="person-name">${p}${info.self ? '<span class="badge">СЕБЕ</span>' : ""}</span>
      <span class="person-metrics">
        <span class="m"><span class="k">Входящие</span><span class="v num pos">${fmtMoney(info.in)}</span></span>
        <span class="m"><span class="k">Исходящие</span><span class="v num neg">${fmtMoneyNoSign(info.out)}</span></span>
        <span class="m"><span class="k">Итого</span><span class="v num" style="color:${net>=0?'var(--green)':'var(--red)'}">${fmtMoney(net,{forceSign:true})}</span></span>
      </span>
    `;
    const detail = document.createElement("div");
    detail.className = "person-detail";
    const table = document.createElement("table");
    for(const t of info.items.slice().sort((a,b)=> (a.date+a.time) < (b.date+b.time) ? 1 : -1)){
      const row = document.createElement("tr");
      const dirIn = t.amount > 0;
      row.innerHTML = `
        <td style="width:90px;">${fmtDate(t.date)}</td>
        <td style="width:56px; color:var(--text-faint);">${t.time}</td>
        <td style="text-align:right; width:120px;" class="amount ${dirIn?'pos':'neg'} num">${fmtMoneyDir(t.amount)}</td>
        <td style="width:100px;"><span class="dir-badge ${dirIn?'dir-in':'dir-out'}">${dirIn?'Входящий':'Исходящий'}</span></td>
      `;
      table.appendChild(row);
    }
    detail.appendChild(table);

    head.addEventListener("click", ()=> detail.classList.toggle("open"));
    card.appendChild(head);
    card.appendChild(detail);
    container.appendChild(card);
  }
  return container;
}

function renderTransfers(){
  const txs = periodTransactions().filter(t=>t.category===TRANSFER_CAT);
  const container = document.getElementById("transfersList");
  container.innerHTML = "";
  container.appendChild(buildTransfersList(txs));
}

/* ---------------- DONATIONS TAB ---------------- */
function renderDonations(){
  const allTxs = periodTransactions();
  let totalSpend = 0;
  for(const t of allTxs){
    if(EXPENSE_CATS.includes(t.category) && t.amount<0) totalSpend += -t.amount;
    if(t.category===DONATION_CAT) totalSpend += -t.amount;
  }
  const txs = allTxs.filter(t=>t.category===DONATION_CAT);
  const byOrg = {};
  for(const t of txs){
    const key = t.merchant || "—";
    if(!byOrg[key]) byOrg[key] = {sum:0, count:0, items:[]};
    byOrg[key].sum += -t.amount;
    byOrg[key].count += 1;
    byOrg[key].items.push(t);
  }
  const orgs = Object.keys(byOrg).sort((a,b)=>byOrg[b].sum-byOrg[a].sum);

  const container = document.getElementById("donationsList");
  container.innerHTML = "";
  if(orgs.length===0){
    container.innerHTML = '<div class="empty-note">Нет пожертвований за выбранный период</div>';
    return;
  }
  for(const org of orgs){
    const info = byOrg[org];
    const pct = totalSpend>0 ? info.sum/totalSpend*100 : 0;
    const card = document.createElement("div");
    card.className = "org-card";
    const head = document.createElement("div");
    head.className = "org-head";
    head.innerHTML = `
      <span class="person-name">${CATEGORY_EMOJI[DONATION_CAT]} ${org}</span>
      <span class="person-metrics">
        <span class="m"><span class="k">Операций</span><span class="v num">${info.count}</span></span>
        <span class="m"><span class="k">Сумма</span><span class="v num neg">${fmtMoneyNoSign(info.sum)}</span></span>
        <span class="m"><span class="k">% от расходов</span><span class="v num">${pctFmt(pct)}</span></span>
      </span>
    `;
    const detail = document.createElement("div");
    detail.className = "person-detail";
    const table = document.createElement("table");
    for(const t of info.items.sort((a,b)=> (a.date+a.time) < (b.date+b.time) ? 1 : -1)){
      const row = document.createElement("tr");
      row.innerHTML = `
        <td style="width:90px;">${fmtDate(t.date)}</td>
        <td style="width:56px; color:var(--text-faint);">${t.time}</td>
        <td style="text-align:right;" class="amount neg num">${fmtMoneyNoSign(t.amount)}</td>
      `;
      table.appendChild(row);
    }
    detail.appendChild(table);
    head.addEventListener("click", ()=> detail.classList.toggle("open"));
    card.appendChild(head);
    card.appendChild(detail);
    container.appendChild(card);
  }
}

/* ---------------- OPERATIONS TAB (all rows, own filters, no period constraint) ---------------- */
function renderOperations(){
  const catChecked = new Set(Array.from(document.querySelectorAll(".cat-cb:checked")).map(cb=>cb.value));
  const cpText = document.getElementById("counterpartyFilter").value.trim().toLowerCase();
  const amountMinRaw = document.getElementById("amountMin").value;
  const amountMaxRaw = document.getElementById("amountMax").value;
  const amountMin = amountMinRaw === "" ? -Infinity : parseFloat(amountMinRaw);
  const amountMax = amountMaxRaw === "" ? Infinity : parseFloat(amountMaxRaw);
  const search = document.getElementById("textSearch").value.trim().toLowerCase();

  const filtered = DATA.filter(t=>{
    if(!catChecked.has(t.category)) return false;
    const cp = (t.counterparty || t.merchant || "").toLowerCase();
    if(cpText && !cp.includes(cpText)) return false;
    if(t.amount < amountMin || t.amount > amountMax) return false;
    if(search){
      const hay = [t.date, t.time, t.category, t.counterparty, t.counterparty_role, t.merchant, t.raw_description, String(t.amount)]
        .filter(Boolean).join(" ").toLowerCase();
      if(!hay.includes(search)) return false;
    }
    return true;
  });

  const sum = filtered.reduce((a,t)=>a+t.amount, 0);
  document.getElementById("opsSummary").innerHTML =
    `Показано: <b>${filtered.length}</b> из <b>${DATA.length}</b> операций &nbsp;·&nbsp; Сумма: <b class="num">${fmtMoney(sum, {forceSign:true})}</b>`;

  const tbody = document.getElementById("opsTableBody");
  tbody.innerHTML = "";
  const frag = document.createDocumentFragment();
  const sorted = filtered.slice().sort((a,b)=> (b.date+b.time).localeCompare(a.date+a.time));
  for(const t of sorted){
    const tr = document.createElement("tr");
    tr.dataset.id = t._id;
    const who = t.category === TRANSFER_CAT
      ? (t.counterparty || t.merchant || "—") + (t.counterparty_role==="себе" ? ' <span class="role-tag">себе</span>' : "")
      : (t.merchant || "—");
    tr.innerHTML = `
      <td>${fmtDate(t.date)}</td>
      <td style="color:var(--text-faint);">${t.time}</td>
      <td class="amount num ${t.amount<0?'neg':'pos'}">${fmtMoneyDir(t.amount)}</td>
      <td><span class="cat-tag">${CATEGORY_EMOJI[t.category]||""} ${t.category}</span></td>
      <td>${who}</td>
    `;
    frag.appendChild(tr);
  }
  tbody.appendChild(frag);
  if(sorted.length===0){
    const tr = document.createElement("tr");
    tr.innerHTML = `<td colspan="5" class="empty-note">Ничего не найдено по текущим фильтрам</td>`;
    tbody.appendChild(tr);
  }
}

loadData();
</script>
